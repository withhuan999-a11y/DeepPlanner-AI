<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepPlanner AI</title>
    
    <!-- 引入前端库 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.8/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        geminiBlue: '#E2F0FF',
                        geminiPurple: '#F2E8FF',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #f8fafc;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,0) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,0.05) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,0.05) 0, transparent 50%);
            background-attachment: fixed;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .gradient-text {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 50%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .markdown-body table { width: 100%; border-collapse: collapse; margin-bottom: 1rem; }
        .markdown-body th, .markdown-body td { border: 1px solid #e2e8f0; padding: 0.5rem; text-align: left; }
        .markdown-body th { background-color: #f1f5f9; }
        .markdown-body ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1rem; }
        .markdown-body ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 1rem; }
        
        .pulse-dot {
            animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: .5; transform: scale(0.8); }
        }
    </style>
</head>
<body class="text-slate-800 antialiased h-screen flex flex-col overflow-hidden">
    <div id="root" class="w-full h-full"></div>

    <script type="text/babel">
        console.log("React 组件开始加载...");
        const { useState, useEffect, useRef } = React;

        function App() {
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState("");
            const [isLoading, setIsLoading] = useState(false);
            const [useDeepSearch, setUseDeepSearch] = useState(true);
            const messagesEndRef = useRef(null);

            const scrollToBottom = () => {
                messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
            };

            useEffect(() => {
                scrollToBottom();
            }, [messages, isLoading]);

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!input.trim() || isLoading) return;

                const userQuery = input.trim();
                const currentHistory = [...messages];
                
                setMessages([...currentHistory, { role: 'user', content: userQuery }]);
                setInput("");
                setIsLoading(true);

                try {
                    const response = await fetch('/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            query: userQuery,
                            history: currentHistory,
                            use_deep_search: useDeepSearch
                        })
                    });
                    
                    const data = await response.json();
                    setMessages(prev => [...prev, { role: 'assistant', content: data.reply }]);
                } catch (error) {
                    setMessages(prev => [...prev, { role: 'assistant', content: "网络请求失败，请检查后端运行状态。" }]);
                } finally {
                    setIsLoading(false);
                    if (useDeepSearch) setUseDeepSearch(false);
                }
            };

            return (
                <div className="max-w-4xl mx-auto w-full h-full flex flex-col pt-8 pb-4 px-4">
                    <header className="flex justify-between items-center mb-6">
                        <div>
                            <h1 className="text-3xl font-extrabold tracking-tight gradient-text">DeepPlanner</h1>
                            <p className="text-sm text-slate-500 mt-1 font-medium">智能规划与反营销侦察网</p>
                        </div>
                        
                        <div className="flex items-center space-x-3 bg-white p-1.5 rounded-full shadow-sm border border-slate-100">
                            <button 
                                onClick={() => setUseDeepSearch(false)}
                                className={`px-4 py-1.5 rounded-full text-sm font-semibold transition-all duration-200 ${!useDeepSearch ? 'bg-slate-800 text-white shadow-md' : 'text-slate-400 hover:text-slate-600'}`}
                            >
                                💬 记忆连聊
                            </button>
                            <button 
                                onClick={() => setUseDeepSearch(true)}
                                className={`px-4 py-1.5 rounded-full text-sm font-semibold transition-all duration-200 ${useDeepSearch ? 'bg-gradient-to-r from-blue-500 to-purple-500 text-white shadow-md' : 'text-slate-400 hover:text-slate-600'}`}
                            >
                                🌐 深度搜索
                            </button>
                        </div>
                    </header>

                    <div className="flex-1 overflow-y-auto pr-2 pb-4 space-y-6" id="chat-container">
                        {messages.length === 0 && !isLoading && (
                            <div className="h-full flex flex-col items-center justify-center text-center opacity-70">
                                <div className="text-6xl mb-4">✨</div>
                                <h2 className="text-xl font-bold text-slate-700">想去哪里？想吃什么？</h2>
                                <p className="text-slate-500 mt-2 max-w-md">请开启「深度搜索」，输入你的想法。<br/>我将为你过滤全网水军，生成最纯净的专属规划。</p>
                            </div>
                        )}

                        {messages.map((msg, index) => (
                            <div key={index} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                <div className={`max-w-[85%] rounded-3xl px-6 py-4 shadow-sm ${
                                    msg.role === 'user' 
                                        ? 'bg-slate-800 text-white rounded-tr-sm' 
                                        : 'glass-panel text-slate-800 rounded-tl-sm border-l-4 border-l-purple-400'
                                }`}>
                                    {msg.role === 'user' ? (
                                        <p className="whitespace-pre-wrap">{msg.content}</p>
                                    ) : (
                                        <div 
                                            className="markdown-body leading-relaxed"
                                            dangerouslySetInnerHTML={{ __html: marked.parse(msg.content) }}
                                        />
                                    )}
                                </div>
                            </div>
                        ))}

                        {isLoading && (
                            <div className="flex justify-start">
                                <div className="glass-panel max-w-[85%] rounded-3xl rounded-tl-sm px-6 py-4 flex items-center space-x-3 border-l-4 border-l-blue-400">
                                    <div className="flex space-x-1">
                                        <div className="w-2.5 h-2.5 bg-blue-500 rounded-full pulse-dot" style={{animationDelay: '0ms'}}></div>
                                        <div className="w-2.5 h-2.5 bg-purple-500 rounded-full pulse-dot" style={{animationDelay: '150ms'}}></div>
                                        <div className="w-2.5 h-2.5 bg-pink-500 rounded-full pulse-dot" style={{animationDelay: '300ms'}}></div>
                                    </div>
                                    <span className="text-slate-500 font-medium text-sm">
                                        {useDeepSearch ? "正在唤醒底端爬虫，交叉验证全网数据，预计耗时20-30秒..." : "正在翻阅记忆，组织语言..."}
                                    </span>
                                </div>
                            </div>
                        )}
                        <div ref={messagesEndRef} />
                    </div>

                    <div className="mt-2 relative">
                        <form onSubmit={handleSubmit} className="relative flex items-center">
                            <textarea
                                value={input}
                                onChange={(e) => setInput(e.target.value)}
                                onKeyDown={(e) => {
                                    if (e.key === 'Enter' && !e.shiftKey) {
                                        e.preventDefault();
                                        handleSubmit(e);
                                    }
                                }}
                                placeholder={useDeepSearch ? "例如：曼谷4天3夜自由行，需要美食和避坑指南..." : "针对上面的攻略，有什么需要修改或追问的？"}
                                className="w-full glass-panel pl-6 pr-14 py-4 rounded-3xl focus:outline-none focus:ring-2 focus:ring-purple-300 resize-none text-slate-800 placeholder-slate-400 font-medium"
                                rows="2"
                                disabled={isLoading}
                            ></textarea>
                            <button 
                                type="submit" 
                                disabled={isLoading || !input.trim()}
                                className="absolute right-3 bottom-3 p-2.5 rounded-full bg-slate-800 text-white disabled:opacity-30 disabled:bg-slate-400 transition-colors hover:bg-slate-700"
                            >
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" className="w-5 h-5">
                                    <path d="M3.478 2.404a.75.75 0 00-.926.941l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.404z" />
                                </svg>
                            </button>
                        </form>
                        <div className="text-center mt-2">
                            <span className="text-xs text-slate-400">DeepPlanner AI 可能会犯错。重要决策请核实。</span>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        console.log("React 组件渲染完毕！");
    </script>
</body>
</html>
